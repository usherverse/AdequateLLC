stages:
  - build
  - deploy

build:
  stage: build
  image: node:20
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour

deploy:
  stage: deploy
  image: node:20
  script:
    - npm install -g wrangler
    - wrangler pages deploy dist/ --project-name=adequatellc
  only:
    - main
